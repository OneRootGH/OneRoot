{% extends "base.html" %}
{% block content %}
  <article class="card">
    <div class="card-header">
      <div>
        <p class="eyebrow">{{ definition.menu_group }}</p>
        <h3>{{ definition.label }} Form</h3>
      </div>
      <a class="button subtle" href="{{ url_for('module_list', module_key=definition.key) }}">Back to {{ definition.label }}</a>
    </div>
    <form method="post" class="form-grid">
      {% for field in definition.fields %}
        <label class="{% if field.field_type == 'textarea' %}span-2{% endif %}">
          <span>{{ field.label }}</span>
          {% if field.field_type == 'textarea' %}
            <textarea name="{{ field.name }}" rows="{{ field.rows }}">{{ payload.get(field.name, '') }}</textarea>
          {% elif field.field_type == 'select' %}
            <select name="{{ field.name }}" {% if field.required %}required{% endif %}>
              <option value="">Select {{ field.label }}</option>
              {% for value, label in field.options %}
                <option value="{{ value }}" {% if payload.get(field.name, '') == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          {% else %}
            <input
              type="{{ 'text' if field.field_type == 'month' else field.field_type }}"
              {% if field.field_type == 'month' %}pattern="\d{4}-\d{2}"{% endif %}
              name="{{ field.name }}"
              step="{{ field.step if field.field_type == 'number' else '' }}"
              value="{{ payload.get(field.name, '') }}"
              {% if field.required %}required{% endif %}
            >
          {% endif %}
        </label>
      {% endfor %}
      <div class="form-actions span-2">
        <button class="button primary" type="submit">Save Record</button>
      </div>
    </form>
    {% if payload %}
      <details class="card muted-box">
        <summary>Preserved extra data</summary>
        <pre>{{ payload|tojson(indent=2) }}</pre>
      </details>
    {% endif %}
  </article>
{% endblock %}
